<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark" />
    <title>Bookmarks — Vortex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0d1f1f;
            color: #c8e8e5;
        }

        body {
            display: flex;
            flex-direction: column;
            position: fixed;
            inset: 0;
        }

        /* ── Toolbar ── */
        #toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid #1e3838;
            background: #0f2222;
            flex-shrink: 0;
        }

        #search-input {
            flex: 1;
            background: #1a3838;
            border: 1px solid #2e4a4c;
            border-radius: 7px;
            color: #c8e8e5;
            font-size: 13px;
            padding: 7px 12px;
            outline: none;
            transition: border-color 0.15s;
        }

        #search-input:focus {
            border-color: #00c8b4;
        }

        #sort-select {
            background: #1a3838;
            border: 1px solid #2e4a4c;
            border-radius: 7px;
            color: #7aadad;
            font-size: 12px;
            padding: 7px 10px;
            cursor: pointer;
            outline: none;
        }

        #clear-all-btn {
            background: rgba(200, 60, 60, 0.08);
            border: 1px solid #6a2e2e;
            border-radius: 7px;
            color: #c86060;
            font-size: 12px;
            padding: 7px 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }

        #clear-all-btn:hover {
            background: rgba(200, 60, 60, 0.18);
            border-color: #c86060;
        }

        /* ── List ── */
        #list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
        }

        #list::-webkit-scrollbar {
            width: 5px;
        }

        #list::-webkit-scrollbar-thumb {
            background: #1a4a4a;
            border-radius: 3px;
        }

        #list::-webkit-scrollbar-thumb:hover {
            background: #00c8b4;
        }

        .bm-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.12s;
            border: 1px solid transparent;
        }

        .bm-item:hover {
            background: #122222;
            border-color: #1e3838;
        }

        .bm-favicon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            flex-shrink: 0;
            object-fit: contain;
            background: #1a3838;
        }

        .bm-favicon-fallback {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            flex-shrink: 0;
            background: rgba(0, 200, 180, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00c8b4;
            font-size: 10px;
            font-weight: 700;
        }

        .bm-info {
            flex: 1;
            min-width: 0;
        }

        .bm-title {
            font-size: 13px;
            color: #c8e8e5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bm-url {
            font-size: 11px;
            color: #4a8080;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bm-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.12s;
            flex-shrink: 0;
        }

        .bm-item:hover .bm-actions {
            opacity: 1;
        }

        .bm-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: #4a8080;
            width: 26px;
            height: 26px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.12s;
        }

        .bm-btn:hover {
            background: #1e3838;
            color: #00c8b4;
        }

        .bm-btn.danger:hover {
            background: #3a1a1a;
            color: #c86060;
        }

        /* ── Empty state ── */
        #empty {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 12px;
            color: #2e5a5a;
        }

        #empty svg {
            opacity: 0.3;
        }

        #empty p {
            font-size: 14px;
        }

        /* ── Edit popup ── */
        #edit-popup {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        #edit-popup.visible {
            display: flex;
        }

        #edit-box {
            background: #122222;
            border: 1px solid #2e4a4c;
            border-radius: 12px;
            padding: 20px;
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #edit-box h3 {
            font-size: 14px;
            color: #e0f4f4;
        }

        .edit-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .edit-field label {
            font-size: 11px;
            color: #4a8080;
        }

        .edit-field input {
            background: #1a3838;
            border: 1px solid #2e4a4c;
            border-radius: 6px;
            color: #c8e8e5;
            font-size: 13px;
            padding: 7px 10px;
            outline: none;
            transition: border-color 0.15s;
        }

        .edit-field input:focus {
            border-color: #00c8b4;
        }

        .edit-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .edit-btn {
            background: rgba(0, 200, 180, 0.1);
            border: 1px solid #2e6a65;
            border-radius: 7px;
            color: #00c8b4;
            font-size: 12px;
            padding: 7px 16px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .edit-btn:hover {
            background: rgba(0, 200, 180, 0.2);
        }

        .edit-btn.cancel {
            background: transparent;
            border-color: #2e4a4c;
            color: #4a8080;
        }

        .edit-btn.cancel:hover {
            background: #1a3838;
            color: #c8e8e5;
        }

        /* ── Count bar ── */
        #count-bar {
            padding: 6px 16px;
            font-size: 11px;
            color: #2e5a5a;
            border-top: 1px solid #1e3838;
            flex-shrink: 0;
        }
    </style>
</head>

<body>

    <div id="toolbar">
        <input id="search-input" type="text" placeholder="Search bookmarks..." spellcheck="false" />
        <select id="sort-select">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
        </select>
        <button id="clear-all-btn">Clear All</button>
    </div>

    <div id="list"></div>
    <div id="empty">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
        </svg>
        <p>No bookmarks yet</p>
    </div>

    <div id="count-bar">0 bookmarks</div>

    <!-- Edit popup -->
    <div id="edit-popup">
        <div id="edit-box">
            <h3>Edit Bookmark</h3>
            <div class="edit-field">
                <label>Title</label>
                <input id="edit-title" type="text" />
            </div>
            <div class="edit-field">
                <label>URL</label>
                <input id="edit-url" type="text" />
            </div>
            <div class="edit-actions">
                <button class="edit-btn cancel" id="edit-cancel">Cancel</button>
                <button class="edit-btn" id="edit-save">Save</button>
            </div>
        </div>
    </div>

    <script>
        let bookmarks = [];
        let _editId = null;

        // ── IPC bridge — postMessage based (cross-origin safe) ──────────────────
        function _invoke(channel, ...args) {
            return new Promise((resolve) => {
                const reqId = '__inv_' + Date.now() + '_' + Math.random();
                function handler(ev) {
                    if (!ev.data || ev.data.__vortexInvokeReply !== reqId) return;
                    window.removeEventListener('message', handler);
                    resolve(ev.data.result);
                }
                window.addEventListener('message', handler);
                setTimeout(() => { window.removeEventListener('message', handler); resolve(null); }, 5000);
                window.parent.postMessage({ __vortexAction: true, channel: '__invoke', payload: { reqId, channel, args } }, '*');
            });
        }

        function _send(channel, payload) {
            window.parent.postMessage({ __vortexAction: true, channel, payload }, '*');
        }

        // ── Render ───────────────────────────────────────────────────────────────
        function _favicon(url) {
            try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=32`; }
            catch { return null; }
        }

        function _initial(title, url) {
            if (title) return title[0].toUpperCase();
            try { return new URL(url).hostname[0].toUpperCase(); } catch { return 'B'; }
        }

        function _filtered() {
            const q = document.getElementById('search-input').value.trim().toLowerCase();
            const sort = document.getElementById('sort-select').value;
            let list = q
                ? bookmarks.filter(b => b.title.toLowerCase().includes(q) || b.url.toLowerCase().includes(q))
                : [...bookmarks];
            if (sort === 'oldest') list.reverse();
            else if (sort === 'az') list.sort((a, b) => a.title.localeCompare(b.title));
            else if (sort === 'za') list.sort((a, b) => b.title.localeCompare(a.title));
            return list;
        }

        function render() {
            const list = document.getElementById('list');
            const empty = document.getElementById('empty');
            const countBar = document.getElementById('count-bar');
            const items = _filtered();

            countBar.textContent = `${bookmarks.length} bookmark${bookmarks.length !== 1 ? 's' : ''}`;

            if (!items.length) {
                list.innerHTML = '';
                empty.style.display = 'flex';
                return;
            }
            empty.style.display = 'none';

            list.innerHTML = items.map(b => {
                const fav = _favicon(b.url);
                const favEl = fav
                    ? `<img class="bm-favicon" src="${fav}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="bm-favicon-fallback" style="display:none">${_initial(b.title, b.url)}</div>`
                    : `<div class="bm-favicon-fallback">${_initial(b.title, b.url)}</div>`;
                return `
          <div class="bm-item" data-id="${b.id}" data-url="${b.url}">
            ${favEl}
            <div class="bm-info">
              <div class="bm-title">${b.title || b.url}</div>
              <div class="bm-url">${b.url}</div>
            </div>
            <div class="bm-actions">
              <button class="bm-btn" data-action="edit" data-id="${b.id}" title="Edit">
                <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="bm-btn danger" data-action="remove" data-id="${b.id}" title="Remove">
                <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
              </button>
            </div>
          </div>`;
            }).join('');
        }

        // ── Events ───────────────────────────────────────────────────────────────
        document.getElementById('list').addEventListener('click', (e) => {
            const btn = e.target.closest('[data-action]');
            if (btn) {
                e.stopPropagation();
                const id = btn.dataset.id;
                if (btn.dataset.action === 'remove') {
                    bookmarks = bookmarks.filter(b => b.id !== id);
                    _send('bookmark:remove', id);
                    render();
                } else if (btn.dataset.action === 'edit') {
                    const bm = bookmarks.find(b => b.id === id);
                    if (!bm) return;
                    _editId = id;
                    document.getElementById('edit-title').value = bm.title;
                    document.getElementById('edit-url').value = bm.url;
                    document.getElementById('edit-popup').classList.add('visible');
                }
                return;
            }
            // Click on item → open URL
            const item = e.target.closest('.bm-item');
            if (item) _send('bookmark:open', item.dataset.url);
        });

        document.getElementById('search-input').addEventListener('input', render);
        document.getElementById('sort-select').addEventListener('change', render);

        document.getElementById('clear-all-btn').addEventListener('click', () => {
            if (!bookmarks.length) return;
            if (confirm('Remove all bookmarks?')) {
                bookmarks = [];
                _send('bookmark:clearAll', null);
                render();
            }
        });

        // Edit popup
        document.getElementById('edit-cancel').addEventListener('click', () => {
            document.getElementById('edit-popup').classList.remove('visible');
        });
        document.getElementById('edit-save').addEventListener('click', () => {
            const bm = bookmarks.find(b => b.id === _editId);
            if (!bm) return;
            bm.title = document.getElementById('edit-title').value.trim() || bm.url;
            bm.url = document.getElementById('edit-url').value.trim() || bm.url;
            _send('bookmark:update', { id: bm.id, title: bm.title, url: bm.url });
            document.getElementById('edit-popup').classList.remove('visible');
            render();
        });
        document.getElementById('edit-popup').addEventListener('click', (e) => {
            if (e.target === document.getElementById('edit-popup'))
                document.getElementById('edit-popup').classList.remove('visible');
        });

        // ── Receive messages from parent ─────────────────────────────────────────
        window.addEventListener('message', (e) => {
            if (!e.data || !e.data.__vortexIPC) return;
            const { channel, data } = e.data;
            if (channel === 'bookmark:history') {
                bookmarks = data || [];
                render();
            } else if (channel === 'bookmark:added') {
                if (!bookmarks.find(b => b.id === data.id)) bookmarks.unshift(data);
                render();
            } else if (channel === 'bookmark:removed') {
                bookmarks = bookmarks.filter(b => b.id !== data);
                render();
            } else if (channel === 'bookmark:updated') {
                const bm = bookmarks.find(b => b.id === data.id);
                if (bm) { bm.title = data.title; bm.url = data.url; }
                render();
            } else if (channel === 'bookmark:cleared') {
                bookmarks = [];
                render();
            }
        });
    </script>
</body>

</html>
