<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' vortex-app: file:; script-src 'self' vortex-app: file:; style-src 'self' 'unsafe-inline' vortex-app: file:; img-src 'self' https: data: vortex-app: file:; connect-src 'self' https://suggestqueries.google.com https://translate.googleapis.com; frame-src vortex-app: file:;" />
  <title>Vortex</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="js/passwords/styles.css" />
  <link rel="stylesheet" href="js/permissions/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Tab Bar -->
    <div id="tabbar-container" class="browser-tabs"></div>

    <!-- Navigation Bar -->
    <div id="navbar-container"></div>

    <!-- WebView Container -->
    <div id="webview-container"></div>
  </div>

  <!-- Network Status Bar -->
  <div id="net-status-bar"></div>

  <!-- Link Preview -->
  <div id="link-preview"></div>

  <!-- Zoom Status Bar -->
  <div id="zoom-status-bar">
    <button id="zoom-out-btn" title="Zoom out">−</button>
    <span id="zoom-pct">100%</span>
    <button id="zoom-in-btn" title="Zoom in">+</button>
    <button id="zoom-reset-btn" title="Reset zoom">↺</button>
  </div>

  <!-- Translate Bar -->
  <div id="translate-bar">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;opacity:0.8"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    <span id="translate-detected">This page is in <strong id="translate-lang-name">English</strong></span>
    <span style="opacity:0.5;font-size:11px;">→</span>
    <select id="translate-target">
      <option value="en">English</option>
      <option value="hi" selected>Hindi</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="ja">Japanese</option>
      <option value="zh-CN">Chinese (Simplified)</option>
      <option value="ar">Arabic</option>
      <option value="pt">Portuguese</option>
      <option value="ru">Russian</option>
      <option value="ko">Korean</option>
      <option value="it">Italian</option>
      <option value="bn">Bengali</option>
      <option value="ta">Tamil</option>
      <option value="te">Telugu</option>
      <option value="mr">Marathi</option>
      <option value="ur">Urdu</option>
    </select>
    <button id="translate-btn">Translate</button>
    <button id="translate-close" title="Dismiss">
      <svg viewBox="0 0 12 12" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
    </button>
  </div>

  <!-- Find in Page Bar -->
  <div id="find-bar">
    <input id="find-input" type="text" placeholder="Find in page..." spellcheck="false" />
    <span id="find-count"></span>
    <button id="find-prev" title="Previous (Shift+Enter)">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
    <button id="find-next" title="Next (Enter)">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <button id="find-close" title="Close (Esc)">
      <svg viewBox="0 0 12 12" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
    </button>
  </div>

  <!-- Quick Launch Panel -->
  <div id="ql-backdrop"></div>
  <div id="ql-panel">
    <div id="ql-header">
      <div id="ql-search-wrap">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#4a8080" stroke-width="2" style="flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="ql-search" type="text" placeholder="Search or enter URL..." spellcheck="false" autocomplete="off" />
        <div id="ql-omni"></div>
      </div>
      <div id="ql-header-actions">
        <button id="ql-menu-btn" title="Popular Sites">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="12" cy="19" r="1" fill="currentColor"/></svg>
        </button>
        <div id="ql-profile-pic" title="Profile Settings">V</div>
      </div>
      <!-- Popular sites dropdown -->
      <div id="ql-menu-dropdown">
        <div id="ql-pop-search-wrap">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#4a8080" stroke-width="2" style="flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="ql-pop-search" type="text" placeholder="Search sites..." spellcheck="false" />
        </div>
        <div id="ql-cat-bar">
          <button class="ql-cat-btn active" data-cat="all">All</button>
          <button class="ql-cat-btn" data-cat="social">Social</button>
          <button class="ql-cat-btn" data-cat="search">Productivity</button>
          <button class="ql-cat-btn" data-cat="entertainment">Entertainment</button>
          <button class="ql-cat-btn" data-cat="shopping">Shopping</button>
          <button class="ql-cat-btn" data-cat="dev">Dev</button>
          <button class="ql-cat-btn" data-cat="news">News</button>
        </div>
        <div id="ql-popular-list"></div>
      </div>
    </div>
    <div id="ql-bookmarks-section">
      <div id="ql-bookmarks-label">Bookmarks</div>
      <div id="ql-bookmarks-grid"></div>
    </div>
  </div>

  <!-- Summarizer Drawer -->
  <div id="summarizer-drawer">
    <div id="sum-header">
      <div id="sum-title">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#00c8b4" stroke-width="2" style="flex-shrink:0">
          <circle cx="12" cy="12" r="10"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="15" x2="12" y2="15"/>
        </svg>
        <span>AI Summary</span>
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        <button id="sum-copy" title="Copy summary">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        <button id="sum-refresh" title="Re-summarize">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2-8.83"/></svg>
        </button>
        <button id="sum-close" title="Close">
          <svg viewBox="0 0 12 12" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
        </button>
      </div>
    </div>
    <div id="sum-page-info"></div>
    <div id="sum-body">
      <div id="sum-content"></div>
    </div>
    <div id="sum-footer">
      <select id="sum-provider">
        <option value="huggingface">HuggingFace (Free)</option>
        <option value="ollama">Ollama (Local)</option>
        <option value="openai">OpenAI</option>
        <option value="extractive">Extractive (Offline)</option>
      </select>
      <input id="sum-api-key" type="password" placeholder="API key (if needed)" />
    </div>
  </div>

  <!-- WhatsApp Panel -->
  <div id="wa-panel">
    <div id="wa-header">
      <div id="wa-title">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="#25D366" style="flex-shrink:0">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
        </svg>
        <span>WhatsApp</span>
      </div>
      <div style="display:flex;gap:4px;align-items:center;">
        <button id="wa-refresh" title="Refresh">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2-8.83"/></svg>
        </button>
        <button id="wa-fullscreen" title="Fullscreen">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>
        <button id="wa-close" title="Close">
          <svg viewBox="0 0 12 12" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
        </button>
      </div>
    </div>
    <webview id="wa-webview" src="https://web.whatsapp.com" partition="persist:whatsapp" allowpopups useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"></webview>
  </div>

  <!-- Floating Panel (Settings / Downloads) -->
  <div id="panel-backdrop"></div>
  <div id="floating-panel">
    <div id="panel-header">
      <span id="panel-title"></span>
      <div style="display:flex;align-items:center;gap:6px;">
        <button id="panel-refresh" title="Refresh">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2-8.83"/>
          </svg>
        </button>
        <button id="panel-close" title="Close (Esc)">
          <svg viewBox="0 0 12 12" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8">
            <line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/>
          </svg>
        </button>
      </div>
    </div>
    <iframe id="panel-frame" frameborder="0"></iframe>
  </div>

  <!-- DevHub Panel -->
  <div id="devhub-backdrop"></div>
  <div id="devhub-panel">
    <div id="dh-header">
      <div id="dh-title">
        <div id="dh-title-icon">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
        </div>
        <span id="dh-title-text">DevHub</span>
      </div>
      <div id="dh-header-right">
        <button id="dh-home" title="All Tools" style="display:none">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <button id="dh-close" title="Close (Esc)">
          <svg viewBox="0 0 12 12" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
        </button>
      </div>
    </div>
    <div id="dh-search-wrap" style="display:none">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#4a8080" stroke-width="2" style="flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="dh-search" type="text" placeholder="Search tools…" spellcheck="false" autocomplete="off" />
      <button id="dh-search-clear" style="display:none">✕</button>
    </div>
    <div id="dh-body"></div>
  </div>

  <!-- Command Palette -->
  <div id="cmd-backdrop"></div>
  <div id="cmd-palette">
    <div id="cmd-search-wrap">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#4a8080" stroke-width="2" style="flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="cmd-input" type="text" placeholder="Type a command or search..." spellcheck="false" autocomplete="off" />
      <span id="cmd-hint">Esc to close</span>
    </div>
    <div id="cmd-list"></div>
  </div>

  <!-- ipc — split into core/ipc/ -->
  <script src="js/core/ipc/bookmarkStore.js"></script>
  <script src="js/core/ipc/downloadHistory.js"></script>
  <script src="js/core/ipc/permissionPrompt.js"></script>
  <script src="js/core/ipc/indicators.js"></script>
  <script src="js/core/ipc/index.js"></script>
  <script src="js/features/prefetch.js"></script>
  <script src="js/core/dialog.js"></script>
  <script src="js/browser/faviconCache.js"></script>
  <script src="js/features/netStatus.js"></script>
  <script src="js/browser/omnibox.js"></script>
  <!-- screenshot — split into features/screenshot/ -->
  <script src="js/features/screenshot/ui/screenshotPanel.js"></script>
  <script src="js/features/screenshot/scripts/screenshotHandler.js"></script>
  <script src="js/features/screenshot/index.js"></script>
  <script src="js/browser/tabPreview.js"></script>
  <script src="js/browser/tabHistory.js"></script>
  <script src="js/browser/contextMenu.js"></script>
  <!-- tabs — split into browser/tabs/ -->
  <script src="js/browser/tabs/ui/tabRenderer.js"></script>
  <script src="js/browser/tabs/ui/tabContextMenu.js"></script>
  <script src="js/browser/tabs/scripts/tabSleep.js"></script>
  <script src="js/browser/tabs/scripts/tabDrag.js"></script>
  <script src="js/browser/tabs/scripts/tabAudio.js"></script>
  <script src="js/browser/tabs/index.js"></script>
  <!-- navigation — split into browser/navigation/ -->
  <script src="js/browser/navigation/ui/toolbarHTML.js"></script>
  <script src="js/browser/navigation/ui/menuDropdownHTML.js"></script>
  <script src="js/browser/navigation/ui/profileMenuHTML.js"></script>
  <script src="js/browser/navigation/scripts/addressBar.js"></script>
  <script src="js/browser/navigation/scripts/securityIcon.js"></script>
  <script src="js/browser/navigation/scripts/progressBar.js"></script>
  <script src="js/browser/navigation/scripts/hoverIcons.js"></script>
  <script src="js/browser/navigation/scripts/menuDropdown.js"></script>
  <script src="js/browser/navigation/scripts/profileMenu.js"></script>
  <script src="js/browser/navigation/index.js"></script>
  <!-- webview — split into browser/webview/ -->
  <script src="js/browser/webview/ui/translateBar.js"></script>
  <script src="js/browser/webview/ui/zoomBar.js"></script>
  <script src="js/browser/webview/scripts/ytAdblock.js"></script>
  <script src="js/browser/webview/scripts/favicon.js"></script>
  <script src="js/browser/webview/scripts/langDetect.js"></script>
  <script src="js/browser/webview/scripts/zoom.js"></script>
  <script src="js/browser/webview/scripts/find.js"></script>
  <script src="js/browser/webview/scripts/preloader.js"></script>
  <script src="js/browser/webview/scripts/listeners.js"></script>
  <script src="js/browser/webview/index.js"></script>
  <!-- quickLaunch — split into features/quickLaunch/ -->
  <script src="js/features/quickLaunch/ui/popularSitesUI.js"></script>
  <script src="js/features/quickLaunch/ui/bookmarksGridUI.js"></script>
  <script src="js/features/quickLaunch/ui/addBookmarkUI.js"></script>
  <script src="js/features/quickLaunch/scripts/popularSitesHandler.js"></script>
  <script src="js/features/quickLaunch/scripts/bookmarksHandler.js"></script>
  <script src="js/features/quickLaunch/scripts/qlOmnibox.js"></script>
  <script src="js/features/quickLaunch/index.js"></script>
  <script src="js/core/panel.js"></script>
  <script src="js/core/session.js"></script>
  <script src="js/features/whatsappPanel.js"></script>
  <!-- DevHub — lazy loaded on first open (42 tool scripts load dynamically) -->
  <script src="js/devhub/devhub.js"></script>
  <script src="js/permissions/index.js"></script>
  <script src="js/permissions/popup.js"></script>
  <script src="js/passwords/crypto.js"></script>
  <script src="js/passwords/generator.js"></script>
  <script src="js/passwords/importer.js"></script>
  <script src="js/passwords/address.js"></script>
  <script src="js/passwords/index.js"></script>
  <script src="js/passwords/autofill.js"></script>
  <script src="js/blocklist/components/statsCard.js"></script>
  <script src="js/blocklist/components/listCard.js"></script>
  <script src="js/blocklist/components/customRules.js"></script>
  <script src="js/blocklist/components/updateBar.js"></script>
  <script src="js/blocklist/components/ytAdBlock.js"></script>
  <script src="js/blocklist/badge.js"></script>
  <!-- app — split into core/app/ -->
  <script src="js/core/app/themes.js"></script>
  <script src="js/core/app/updateBadge.js"></script>
  <script src="js/core/app/index.js"></script>
  <!-- summarizer — split into features/summarizer/ -->
  <script src="js/features/summarizer/ui/summarizerUI.js"></script>
  <script src="js/features/summarizer/scripts/providers/extractive.js"></script>
  <script src="js/features/summarizer/scripts/providers/huggingface.js"></script>
  <script src="js/features/summarizer/scripts/providers/ollama.js"></script>
  <script src="js/features/summarizer/scripts/providers/openai.js"></script>
  <script src="js/features/summarizer/scripts/summarizerHandler.js"></script>
  <script src="js/features/summarizer/index.js"></script>
</body>
</html>
