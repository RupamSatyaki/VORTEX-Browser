<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' vortex-app: file:; script-src 'self' vortex-app: file:; style-src 'self' 'unsafe-inline' vortex-app: file:; img-src 'self' https: data: vortex-app: file:; connect-src 'self' https://suggestqueries.google.com https://translate.googleapis.com; frame-src vortex-app: file:;" />
  <title>Vortex</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Tab Bar -->
    <div id="tabbar-container" class="browser-tabs"></div>

    <!-- Navigation Bar -->
    <div id="navbar-container"></div>

    <!-- WebView Container -->
    <div id="webview-container"></div>
  </div>

  <!-- Link Preview -->
  <div id="link-preview"></div>

  <!-- Zoom Status Bar -->
  <div id="zoom-status-bar">
    <button id="zoom-out-btn" title="Zoom out">−</button>
    <span id="zoom-pct">100%</span>
    <button id="zoom-in-btn" title="Zoom in">+</button>
    <button id="zoom-reset-btn" title="Reset zoom">↺</button>
  </div>

  <!-- Translate Bar -->
  <div id="translate-bar">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;opacity:0.8"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    <span id="translate-detected">This page is in <strong id="translate-lang-name">English</strong></span>
    <span style="opacity:0.5;font-size:11px;">→</span>
    <select id="translate-target">
      <option value="en">English</option>
      <option value="hi" selected>Hindi</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="ja">Japanese</option>
      <option value="zh-CN">Chinese (Simplified)</option>
      <option value="ar">Arabic</option>
      <option value="pt">Portuguese</option>
      <option value="ru">Russian</option>
      <option value="ko">Korean</option>
      <option value="it">Italian</option>
      <option value="bn">Bengali</option>
      <option value="ta">Tamil</option>
      <option value="te">Telugu</option>
      <option value="mr">Marathi</option>
      <option value="ur">Urdu</option>
    </select>
    <button id="translate-btn">Translate</button>
    <button id="translate-close" title="Dismiss">
      <svg viewBox="0 0 12 12" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
    </button>
  </div>

  <!-- Find in Page Bar -->
  <div id="find-bar">
    <input id="find-input" type="text" placeholder="Find in page..." spellcheck="false" />
    <span id="find-count"></span>
    <button id="find-prev" title="Previous (Shift+Enter)">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
    <button id="find-next" title="Next (Enter)">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <button id="find-close" title="Close (Esc)">
      <svg viewBox="0 0 12 12" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
    </button>
  </div>

  <!-- Quick Launch Panel -->
  <div id="ql-backdrop"></div>
  <div id="ql-panel">
    <div id="ql-header">
      <div id="ql-search-wrap">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#4a8080" stroke-width="2" style="flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="ql-search" type="text" placeholder="Search or enter URL..." spellcheck="false" autocomplete="off" />
        <div id="ql-omni"></div>
      </div>
      <div id="ql-header-actions">
        <button id="ql-menu-btn" title="Popular Sites">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="12" cy="19" r="1" fill="currentColor"/></svg>
        </button>
        <div id="ql-profile-pic" title="Profile Settings">V</div>
      </div>
      <!-- Popular sites dropdown -->
      <div id="ql-menu-dropdown">
        <div id="ql-pop-search-wrap">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#4a8080" stroke-width="2" style="flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="ql-pop-search" type="text" placeholder="Search sites..." spellcheck="false" />
        </div>
        <div id="ql-popular-list"></div>
      </div>
    </div>
    <div id="ql-bookmarks-section">
      <div id="ql-bookmarks-label">Bookmarks</div>
      <div id="ql-bookmarks-grid"></div>
    </div>
  </div>

  <!-- Floating Panel (Settings / Downloads) -->
  <div id="panel-backdrop"></div>
  <div id="floating-panel">
    <div id="panel-header">
      <span id="panel-title"></span>
      <div style="display:flex;align-items:center;gap:6px;">
        <button id="panel-refresh" title="Refresh">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2-8.83"/>
          </svg>
        </button>
        <button id="panel-close" title="Close (Esc)">
          <svg viewBox="0 0 12 12" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8">
            <line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/>
          </svg>
        </button>
      </div>
    </div>
    <iframe id="panel-frame" frameborder="0"></iframe>
  </div>

  <script src="js/ipc.js"></script>
  <script src="js/prefetch.js"></script>
  <script src="js/omnibox.js"></script>
  <script src="js/screenshot.js"></script>
  <script src="js/tabPreview.js"></script>
  <script src="js/tabHistory.js"></script>
  <script src="js/contextMenu.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/webview.js"></script>
  <script src="js/quickLaunch.js"></script>
  <script src="js/panel.js"></script>
  <script src="js/session.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
