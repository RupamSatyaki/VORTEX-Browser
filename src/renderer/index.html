<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:;" />
  <title>Vortex</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Tab Bar -->
    <div id="tabbar-container" class="browser-tabs"></div>

    <!-- Navigation Bar -->
    <div id="navbar-container"></div>

    <!-- WebView Container -->
    <div id="webview-container"></div>
  </div>

  <!-- Link Preview -->
  <div id="link-preview"></div>

  <!-- Zoom Status Bar -->
  <div id="zoom-status-bar">
    <button id="zoom-out-btn" title="Zoom out">−</button>
    <span id="zoom-pct">100%</span>
    <button id="zoom-in-btn" title="Zoom in">+</button>
    <button id="zoom-reset-btn" title="Reset zoom">↺</button>
  </div>

  <!-- Floating Panel (Settings / Downloads) -->
  <div id="panel-backdrop"></div>
  <div id="floating-panel">
    <div id="panel-header">
      <span id="panel-title"></span>
      <div style="display:flex;align-items:center;gap:6px;">
        <button id="panel-refresh" title="Refresh">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2-8.83"/>
          </svg>
        </button>
        <button id="panel-close" title="Close (Esc)">
          <svg viewBox="0 0 12 12" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8">
            <line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/>
          </svg>
        </button>
      </div>
    </div>
    <iframe id="panel-frame" frameborder="0"></iframe>
  </div>

  <script src="js/ipc.js"></script>
  <script src="js/prefetch.js"></script>
  <script src="js/tabPreview.js"></script>
  <script src="js/contextMenu.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/webview.js"></script>
  <script src="js/panel.js"></script>
  <script src="js/session.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
