<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="color-scheme" content="dark" />
  <title>Downloads — Vortex</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #0d1f1f;
      color: #c8e8e5;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100vw;
      height: 100vh;
    }

    .page {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 28px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: rgba(0, 200, 180, 0.12);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00c8b4;
      flex-shrink: 0;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #e0f4f4;
    }

    .subtitle {
      font-size: 13px;
      color: #4a8080;
      margin-bottom: 28px;
      margin-left: 48px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .search-box {
      flex: 1;
      background: #162828;
      border: 1px solid #2e4a4c;
      border-radius: 8px;
      padding: 8px 14px;
      color: #c8e8e5;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box::placeholder {
      color: #3a6060;
    }

    .search-box:focus {
      border-color: #00c8b4;
    }

    .btn-clear {
      background: transparent;
      border: 1px solid #2e4a4c;
      border-radius: 8px;
      color: #4a8080;
      font-size: 12px;
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-clear:hover {
      border-color: #c84a4a;
      color: #c84a4a;
    }

    /* ── Download item ── */
    .dl-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      min-height: 0;
    }

    .dl-list::-webkit-scrollbar {
      width: 6px;
    }

    .dl-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .dl-list::-webkit-scrollbar-thumb {
      background: #1a4a4a;
      border-radius: 3px;
    }

    .dl-list::-webkit-scrollbar-thumb:hover {
      background: #00c8b4;
    }

    .dl-item {
      background: #122222;
      border: 1px solid #1e3838;
      border-radius: 10px;
      padding: 14px 16px;
      transition: background 0.15s;
      animation: slideIn 0.2s ease;
    }

    .dl-item:hover {
      background: #162e2e;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .dl-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .file-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .fi-pdf {
      background: rgba(220, 60, 60, 0.15);
      color: #e06060;
    }

    .fi-zip {
      background: rgba(180, 120, 0, 0.15);
      color: #c8a040;
    }

    .fi-img {
      background: rgba(0, 160, 200, 0.15);
      color: #40b8d8;
    }

    .fi-exe {
      background: rgba(100, 80, 200, 0.15);
      color: #9080e0;
    }

    .fi-doc {
      background: rgba(0, 120, 200, 0.15);
      color: #4090d8;
    }

    .fi-vid {
      background: rgba(200, 60, 120, 0.15);
      color: #e060a0;
    }

    .fi-file {
      background: rgba(60, 100, 100, 0.15);
      color: #5a9090;
    }

    .dl-info {
      flex: 1;
      min-width: 0;
    }

    .dl-name {
      font-size: 13px;
      color: #c8e8e5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .dl-meta {
      font-size: 11px;
      color: #3a7070;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .dl-speed {
      color: #00c8b4;
      font-weight: 600;
    }

    .dl-size {
      color: #4a8080;
    }

    .dl-pct {
      color: #7aadad;
    }

    .dl-date {
      color: #2e5a5a;
      margin-left: auto;
    }

    .status-badge {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 5px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .sb-progressing {
      background: rgba(0, 200, 180, 0.12);
      color: #00c8b4;
    }

    .sb-completed {
      background: rgba(0, 200, 100, 0.12);
      color: #40c880;
    }

    .sb-cancelled {
      background: rgba(200, 60, 60, 0.12);
      color: #c86060;
    }

    .sb-interrupted {
      background: rgba(200, 60, 60, 0.12);
      color: #c86060;
    }

    .sb-waiting {
      background: rgba(200, 160, 0, 0.12);
      color: #c8a040;
    }

    .sb-deleted {
      background: rgba(120, 80, 160, 0.15);
      color: #a070c8;
    }

    .dl-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: #3a6060;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .icon-btn:hover {
      background: #1e3838;
      color: #00c8b4;
    }

    .icon-btn.danger:hover {
      background: rgba(200, 60, 60, 0.12);
      color: #c86060;
    }

    .icon-btn:disabled {
      opacity: 0.25;
      cursor: default;
      pointer-events: none;
    }

    /* Progress bar */
    .dl-progress-wrap {
      margin-top: 10px;
      height: 4px;
      background: #1e3838;
      border-radius: 2px;
      overflow: hidden;
    }

    .dl-progress-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #00c8b4, #36e8d4);
      transition: width 0.4s ease;
      position: relative;
    }

    /* Shimmer animation while downloading */
    .dl-progress-fill.active::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: shimmer 1.2s linear infinite;
    }

    @keyframes shimmer {
      to {
        left: 200%;
      }
    }

    .dl-progress-fill.done {
      background: #40c880;
    }

    .dl-progress-fill.failed {
      background: #c86060;
    }

    .dl-progress-fill.waiting {
      background: #c8a040;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* Empty state */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: #2a4a4a;
      text-align: center;
      gap: 16px;
    }

    .empty svg {
      opacity: 0.2;
    }

    .empty p {
      font-size: 14px;
      color: #3a6060;
    }

    .empty small {
      font-size: 12px;
      color: #2a4a4a;
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
      </div>
      <h1>Downloads</h1>
    </div>
    <p class="subtitle">Files you've downloaded will appear here.</p>

    <div class="toolbar" id="toolbar" style="display:none">
      <input class="search-box" id="search" type="text" placeholder="Search downloads..." />
      <button class="btn-clear" id="btn-clear-all">Clear completed</button>
    </div>

    <div class="dl-list" id="dl-list"></div>

    <div class="empty" id="empty-state">
      <svg viewBox="0 0 24 24" width="72" height="72" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="7 10 12 15 17 10" />
        <line x1="12" y1="15" x2="12" y2="3" />
      </svg>
      <p>No downloads yet</p>
      <small>Files you download will show up here automatically.</small>
    </div>
  </div>

  <script>
    const downloads = new Map(); // id -> data

    // ── Helpers ──────────────────────────────────────────────────────────────

    function extType(name) {
      const ext = (name.split('.').pop() || '').toLowerCase();
      if (ext === 'pdf') return { cls: 'fi-pdf', label: 'PDF' };
      if (['zip', 'rar', '7z', 'tar', 'gz', 'bz2'].includes(ext)) return { cls: 'fi-zip', label: ext };
      if (['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'ico'].includes(ext)) return { cls: 'fi-img', label: ext };
      if (['exe', 'msi', 'dmg', 'deb', 'appimage', 'apk'].includes(ext)) return { cls: 'fi-exe', label: ext };
      if (['doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx', 'odt'].includes(ext)) return { cls: 'fi-doc', label: ext };
      if (['mp4', 'mkv', 'avi', 'mov', 'webm', 'flv'].includes(ext)) return { cls: 'fi-vid', label: ext };
      return { cls: 'fi-file', label: ext || 'FILE' };
    }

    function statusLabel(status) {
      const map = {
        progressing: 'Downloading...',
        waiting: 'Waiting for network',
        completed: 'Completed',
        cancelled: 'Cancelled',
        interrupted: 'Failed',
        deleted: 'File Deleted',
      };
      return map[status] || status;
    }

    function svgIcon(d, size = 14) {
      return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="currentColor" stroke-width="2">${d}</svg>`;
    }

    const ICONS = {
      openFile: svgIcon('<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>'),
      openFolder: svgIcon('<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>'),
      cancel: svgIcon('<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'),
      remove: svgIcon('<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>'),
    };

    // ── Render ────────────────────────────────────────────────────────────────

    function renderAll() {
      const q = (document.getElementById('search').value || '').toLowerCase();
      const list = [...downloads.values()].filter(d =>
        !q || d.filename.toLowerCase().includes(q)
      );

      const container = document.getElementById('dl-list');
      const empty = document.getElementById('empty-state');
      const toolbar = document.getElementById('toolbar');

      if (!downloads.size) {
        empty.style.display = 'flex';
        toolbar.style.display = 'none';
        container.innerHTML = '';
        return;
      }

      empty.style.display = 'none';
      toolbar.style.display = 'flex';

      // Only update existing items, add new ones, remove deleted ones
      const existingIds = new Set([...container.querySelectorAll('.dl-item')].map(el => el.dataset.id));
      const newIds = new Set(list.map(d => String(d.id)));

      // Remove items no longer in list
      existingIds.forEach(id => {
        if (!newIds.has(id)) {
          const el = container.querySelector(`.dl-item[data-id="${id}"]`);
          if (el) el.remove();
        }
      });

      list.forEach((dl, idx) => {
        const idStr = String(dl.id);
        let el = container.querySelector(`.dl-item[data-id="${idStr}"]`);

        if (!el) {
          el = document.createElement('div');
          el.className = 'dl-item';
          el.dataset.id = idStr;
          // Insert at correct position
          const items = container.querySelectorAll('.dl-item');
          if (items[idx]) container.insertBefore(el, items[idx]);
          else container.appendChild(el);
        }

        updateItemEl(el, dl);
      });
    }

    function updateItemEl(el, dl) {
      const { cls, label } = extType(dl.filename);
      const isActive = dl.status === 'progressing' || dl.status === 'waiting';
      const isDone   = dl.status === 'completed';
      const isDeleted = dl.status === 'deleted';

      const pct = dl.percent || 0;
      const fillClass = isActive
        ? (dl.status === 'waiting' ? 'waiting' : 'active')
        : isDone ? 'done' : 'failed';

      const dateStr = dl.completedAt
        ? new Date(dl.completedAt).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' })
        : '';

      el.innerHTML = `
      <div class="dl-top">
        <div class="file-icon ${cls}">${label}</div>
        <div class="dl-info">
          <div class="dl-name" title="${dl.filename}">${dl.filename}</div>
          <div class="dl-meta">
            ${isActive ? `<span class="dl-speed">${dl.speed || '...'}</span>` : ''}
            <span class="dl-size">${dl.receivedFormatted || '0 B'}${dl.totalFormatted ? ' / ' + dl.totalFormatted : ''}</span>
            ${isActive ? `<span class="dl-pct">${pct}%</span>` : ''}
            ${dateStr ? `<span class="dl-date">${dateStr}</span>` : ''}
          </div>
        </div>
        <span class="status-badge sb-${dl.status}">${statusLabel(dl.status)}</span>
        <div class="dl-actions">
          ${isDone ? `
            <button class="icon-btn" title="Open file" data-action="openFile" data-path="${dl.savePath || ''}">${ICONS.openFile}</button>
            <button class="icon-btn" title="Show in folder" data-action="openFolder" data-path="${dl.savePath || ''}">${ICONS.openFolder}</button>
          ` : ''}
          ${isActive ? `
            <button class="icon-btn danger" title="Cancel" data-action="cancel" data-id="${dl.id}">${ICONS.cancel}</button>
          ` : ''}
          ${!isActive ? `
            <button class="icon-btn danger" title="Remove from history" data-action="remove" data-id="${dl.id}">${ICONS.remove}</button>
          ` : ''}
        </div>
      </div>
      <div class="dl-progress-wrap">
        <div class="dl-progress-fill ${fillClass}" style="width:${pct}%"></div>
      </div>
    `;
    }

    // Check if completed files still exist on disk
    async function checkFileExistence() {
      for (const [id, dl] of downloads) {
        if (dl.status === 'completed' && dl.savePath) {
          const exists = await sendInvoke('file:exists', dl.savePath);
          if (!exists && dl.status !== 'deleted') {
            dl.status = 'deleted';
            // Persist the deleted status to history
            sendAction('download:markDeleted', { id: dl.id });
            const el = document.querySelector(`.dl-item[data-id="${id}"]`);
            if (el) updateItemEl(el, dl);
          }
        }
      }
    }

    function sendInvoke(channel, ...args) {
      return window.parent.__vortexInvoke
        ? window.parent.__vortexInvoke(channel, ...args)
        : Promise.resolve(false);
    }

    // ── IPC — receive via postMessage from parent iframe ─────────────────────

    window.addEventListener('message', (e) => {
      const msg = e.data;
      if (!msg || !msg.__vortexIPC) return;
      const { channel, data } = msg;

      if (channel === 'download:history') {
        data.forEach(entry => {
          if (!downloads.has(entry.id)) downloads.set(entry.id, entry);
        });
        renderAll();
        // Check which completed files no longer exist on disk
        checkFileExistence();
      } else if (channel === 'download:start') {
        downloads.set(data.id, { ...data, receivedFormatted: '0 B', percent: 0, speed: '' });
        renderAll();
      } else if (channel === 'download:update') {
        const dl = downloads.get(data.id);
        if (dl) Object.assign(dl, data);
        renderAll();
      } else if (channel === 'download:done') {
        const dl = downloads.get(data.id);
        if (dl) Object.assign(dl, data, { percent: data.status === 'completed' ? 100 : dl.percent });
        else downloads.set(data.id, data);
        renderAll();
      } else if (channel === 'download:removed') {
        downloads.delete(data);
        renderAll();
      }
    });

    // ── Actions — send via postMessage to parent ──────────────────────────────

    function sendAction(channel, payload) {
      window.parent.postMessage({ __vortexAction: true, channel, payload }, '*');
    }

    // ── Actions ───────────────────────────────────────────────────────────────

    document.getElementById('dl-list').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const { action, id, path: filePath } = btn.dataset;

      if (action === 'cancel') sendAction('download:cancel', Number(id));
      if (action === 'remove') {
        // Remove from UI immediately
        downloads.delete(Number(id));
        renderAll();
        // Remove from JSON history file
        sendAction('download:remove', Number(id));
      }
      if (action === 'openFile') sendAction('download:openFile', filePath);
      if (action === 'openFolder') sendAction('download:openFolder', filePath);
    });

    document.getElementById('search').addEventListener('input', renderAll);

    document.getElementById('btn-clear-all').addEventListener('click', () => {
      [...downloads.values()]
        .filter(d => d.status !== 'progressing' && d.status !== 'waiting')
        .forEach(d => {
          sendAction('download:remove', d.id);
          downloads.delete(d.id);
        });
      renderAll();
    });

    renderAll();
  </script>
</body>

</html>
