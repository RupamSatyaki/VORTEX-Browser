<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark" />
    <title>New Tab — Vortex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: auto;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0d1f1f;
            color: #c8e8e5
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            padding: 24px;
            min-height: 100%;
        }

        /* Clock */
        #clock {
            font-size: 56px;
            font-weight: 200;
            color: #e0f4f4;
            letter-spacing: 4px;
            text-align: center;
            line-height: 1
        }

        #date {
            font-size: 14px;
            color: #4a8080;
            text-align: center;
            margin-top: 6px
        }

        /* Quick links */
        #quick-links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center
        }

        .ql-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 10px 14px;
            border-radius: 10px;
            transition: background 0.15s;
            text-decoration: none;
            color: #7aadad
        }

        .ql-item:hover {
            background: rgba(0, 200, 180, 0.08);
            color: #00c8b4
        }

        .ql-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #122222;
            border: 1px solid #1e3838;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px
        }

        .ql-label {
            font-size: 11px
        }

        /* Typing test */
        #typing-widget {
            background: #122222;
            border: 1px solid #1e3838;
            border-radius: 14px;
            padding: 24px 28px;
            width: min(680px, 90vw);
            display: flex;
            flex-direction: column;
            gap: 14px
        }

        #typing-header {
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        #typing-title {
            font-size: 13px;
            font-weight: 600;
            color: #00c8b4;
            display: flex;
            align-items: center;
            gap: 6px
        }

        #typing-stats {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #4a8080
        }

        .ts-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px
        }

        .ts-val {
            font-size: 18px;
            font-weight: 700;
            color: #c8e8e5
        }

        .ts-lbl {
            font-size: 10px;
            color: #4a8080;
            text-transform: uppercase;
            letter-spacing: 0.5px
        }

        #typing-text {
            font-size: 16px;
            line-height: 1.8;
            color: #2e5050;
            letter-spacing: 0.3px;
            user-select: none;
            min-height: 72px;
            position: relative
        }

        #typing-text .char {
            transition: color 0.05s
        }

        #typing-text .char.correct {
            color: #00c8b4
        }

        #typing-text .char.wrong {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.12);
            border-radius: 2px
        }

        #typing-text .char.cursor {
            border-left: 2px solid #00c8b4;
            margin-left: -1px
        }

        #typing-text .char.active {
            color: #e0f4f4
        }

        #typing-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px
        }

        #typing-footer {
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        #typing-hint {
            font-size: 11px;
            color: #2e5050
        }

        #typing-restart {
            background: rgba(0, 200, 180, 0.1);
            border: 1px solid #2e6a65;
            border-radius: 6px;
            color: #00c8b4;
            font-size: 11px;
            padding: 5px 12px;
            cursor: pointer;
            transition: all 0.15s
        }

        #typing-restart:hover {
            background: rgba(0, 200, 180, 0.2)
        }

        #typing-result {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 8px 0
        }

        #typing-result.show {
            display: flex
        }

        #result-wpm {
            font-size: 42px;
            font-weight: 700;
            color: #00c8b4
        }

        #result-label {
            font-size: 12px;
            color: #4a8080
        }

        #result-details {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: #7aadad
        }

        #progress-bar {
            height: 2px;
            background: #1e3838;
            border-radius: 1px;
            overflow: hidden
        }

        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00c8b4, #1a6a6a);
            width: 0%;
            transition: width 0.1s linear
        }
    </style>
</head>

<body>

    <div id="clock"></div>

    <div id="quick-links">
        <a class="ql-item" href="https://www.google.com">
            <div class="ql-icon">G</div><span class="ql-label">Google</span>
        </a>
        <a class="ql-item" href="https://www.youtube.com">
            <div class="ql-icon">▶</div><span class="ql-label">YouTube</span>
        </a>
        <a class="ql-item" href="https://github.com">
            <div class="ql-icon" style="font-size:14px">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="#7aadad">
                    <path
                        d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />
                </svg>
            </div><span class="ql-label">GitHub</span>
        </a>
        <a class="ql-item" href="https://www.reddit.com">
            <div class="ql-icon">R</div><span class="ql-label">Reddit</span>
        </a>
        <a class="ql-item" href="https://twitter.com">
            <div class="ql-icon">𝕏</div><span class="ql-label">Twitter</span>
        </a>
    </div>

    <div id="typing-widget">
        <div id="typing-header">
            <div id="typing-title">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="4 7 4 4 20 4 20 7" />
                    <line x1="9" y1="20" x2="15" y2="20" />
                    <line x1="12" y1="4" x2="12" y2="20" />
                </svg>
                Typing Speed Test
            </div>
            <div id="typing-stats">
                <div class="ts-stat"><span class="ts-val" id="stat-wpm">0</span><span class="ts-lbl">WPM</span></div>
                <div class="ts-stat"><span class="ts-val" id="stat-acc">—</span><span class="ts-lbl">ACC</span></div>
                <div class="ts-stat"><span class="ts-val" id="stat-time">60</span><span class="ts-lbl">SEC</span></div>
            </div>
        </div>

        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>

        <div id="typing-text" tabindex="0"></div>
        <input id="typing-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off"
            spellcheck="false" />

        <div id="typing-result">
            <div id="result-wpm">0</div>
            <div id="result-label">words per minute</div>
            <div id="result-details">
                <span id="result-acc"></span>
                <span id="result-chars"></span>
                <span id="result-errors"></span>
            </div>
        </div>

        <div id="typing-footer">
            <span id="typing-hint">Click here or press any key to start</span>
            <button id="typing-restart">↺ Restart</button>
        </div>
    </div>

    <script>
        // ── Clock ──────────────────────────────────────────────────────────────────
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            document.getElementById('date').textContent =
                `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // ── Quick links — open via IPC to host ────────────────────────────────────
        document.querySelectorAll('.ql-item').forEach(a => {
            a.addEventListener('click', e => {
                e.preventDefault();
                const url = a.href;
                if (window.__vortexBridge) window.__vortexBridge.sendToHost('newtab:openUrl', url);
            });
        });

        // ── Typing Test ────────────────────────────────────────────────────────────
        const WORDS = [
            'the', 'be', 'to', 'of', 'and', 'a', 'in', 'that', 'have', 'it', 'for', 'not', 'on', 'with',
            'he', 'as', 'you', 'do', 'at', 'this', 'but', 'his', 'by', 'from', 'they', 'we', 'say', 'her',
            'she', 'or', 'an', 'will', 'my', 'one', 'all', 'would', 'there', 'their', 'what', 'so', 'up',
            'out', 'if', 'about', 'who', 'get', 'which', 'go', 'me', 'when', 'make', 'can', 'like', 'time',
            'no', 'just', 'him', 'know', 'take', 'people', 'into', 'year', 'your', 'good', 'some', 'could',
            'them', 'see', 'other', 'than', 'then', 'now', 'look', 'only', 'come', 'its', 'over', 'think',
            'also', 'back', 'after', 'use', 'two', 'how', 'our', 'work', 'first', 'well', 'way', 'even',
            'new', 'want', 'because', 'any', 'these', 'give', 'day', 'most', 'us', 'great', 'between',
            'need', 'large', 'often', 'hand', 'high', 'place', 'hold', 'turn', 'move', 'live', 'where',
            'much', 'through', 'long', 'down', 'should', 'never', 'each', 'those', 'feel', 'seem', 'ask',
        ];

        const TOTAL_TIME = 60;
        let words = [], charIndex = 0, errors = 0, correct = 0;
        let timer = null, timeLeft = TOTAL_TIME, started = false, finished = false;

        function _genWords(n = 60) {
            const arr = [];
            for (let i = 0; i < n; i++) arr.push(WORDS[Math.floor(Math.random() * WORDS.length)]);
            return arr;
        }

        function _render() {
            const el = document.getElementById('typing-text');
            const text = words.join(' ');
            el.innerHTML = text.split('').map((ch, i) => {
                let cls = 'char';
                if (i < charIndex) cls += correct > 0 ? ' correct' : '';
                if (i === charIndex) cls += ' cursor active';
                return `<span class="${cls}" data-i="${i}">${ch === ' ' ? '&nbsp;' : ch}</span>`;
            }).join('');
            // Re-color based on typed history
            _recolor();
        }

        const _typed = []; // 'correct' | 'wrong' per char index

        function _recolor() {
            const spans = document.querySelectorAll('#typing-text .char');
            spans.forEach((s, i) => {
                s.className = 'char';
                if (i < _typed.length) {
                    s.classList.add(_typed[i]);
                } else if (i === _typed.length) {
                    s.classList.add('cursor', 'active');
                }
            });
        }

        function _calcWPM() {
            const elapsed = (TOTAL_TIME - timeLeft) || 1;
            return Math.round((correct / 5) / (elapsed / 60));
        }

        function _calcAcc() {
            const total = correct + errors;
            return total === 0 ? 100 : Math.round((correct / total) * 100);
        }

        function _updateStats() {
            document.getElementById('stat-wpm').textContent = started ? _calcWPM() : 0;
            document.getElementById('stat-acc').textContent = started ? _calcAcc() + '%' : '—';
            document.getElementById('stat-time').textContent = timeLeft;
            document.getElementById('progress-fill').style.width = ((TOTAL_TIME - timeLeft) / TOTAL_TIME * 100) + '%';
        }

        function _startTimer() {
            if (timer) return;
            timer = setInterval(() => {
                timeLeft--;
                _updateStats();
                if (timeLeft <= 0) _finish();
            }, 1000);
        }

        function _finish() {
            clearInterval(timer);
            finished = true;
            const wpm = _calcWPM();
            const acc = _calcAcc();
            document.getElementById('typing-result').classList.add('show');
            document.getElementById('typing-text').style.display = 'none';
            document.getElementById('result-wpm').textContent = wpm;
            document.getElementById('result-acc').textContent = `Accuracy: ${acc}%`;
            document.getElementById('result-chars').textContent = `Correct: ${correct}`;
            document.getElementById('result-errors').textContent = `Errors: ${errors}`;
            document.getElementById('typing-hint').textContent = 'Test complete!';
            document.getElementById('progress-fill').style.width = '100%';
        }

        function reset() {
            clearInterval(timer);
            timer = null; timeLeft = TOTAL_TIME; started = false; finished = false;
            charIndex = 0; errors = 0; correct = 0; _typed.length = 0;
            words = _genWords(80);
            document.getElementById('typing-result').classList.remove('show');
            document.getElementById('typing-text').style.display = '';
            document.getElementById('typing-hint').textContent = 'Click here or press any key to start';
            document.getElementById('progress-fill').style.width = '0%';
            _render();
            _updateStats();
        }

        // Handle keypress
        document.getElementById('typing-text').addEventListener('keydown', handleKey);
        document.addEventListener('keydown', (e) => {
            if (finished) return;
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            if (e.key === 'Tab') return;
            document.getElementById('typing-text').focus();
            handleKey(e);
        });

        function handleKey(e) {
            if (finished) return;
            const text = words.join(' ');
            if (e.key === 'Backspace') {
                if (charIndex > 0) {
                    charIndex--;
                    const prev = _typed.pop();
                    if (prev === 'correct') correct--;
                    else errors--;
                    _recolor();
                    _updateStats();
                }
                return;
            }
            if (e.key.length !== 1) return;
            e.preventDefault();

            if (!started) { started = true; _startTimer(); }

            const expected = text[charIndex];
            if (e.key === expected) {
                _typed.push('correct');
                correct++;
            } else {
                _typed.push('wrong');
                errors++;
            }
            charIndex++;

            // Auto-scroll cursor into view
            const cursorEl = document.querySelector('#typing-text .cursor');
            if (cursorEl) cursorEl.scrollIntoView({ block: 'nearest' });

            if (charIndex >= text.length) _finish();
            else { _recolor(); _updateStats(); }
        }

        document.getElementById('typing-restart').addEventListener('click', reset);
        document.getElementById('typing-text').addEventListener('click', () => {
            document.getElementById('typing-text').focus();
        });

        reset();
    </script>
</body>

</html>
