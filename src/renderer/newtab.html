<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>New Tab — Vortex</title>
    <style>
        :root {
            --bg-dark: #050a0a;
            --accent: #00c8b4;
            --accent-glow: rgba(0, 200, 180, 0.25);
            --glass-bg: rgba(15, 25, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #e0f4f4;
            --text-dim: #769999;
            --card-hover: rgba(0, 200, 180, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            outline: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            scroll-behavior: smooth;
        }

        /* Animated Background Mesh */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(0, 200, 180, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 60, 60, 0.25) 0px, transparent 50%),
                radial-gradient(at 80% 20%, rgba(0, 200, 180, 0.04) 0px, transparent 40%),
                radial-gradient(at 20% 80%, rgba(0, 30, 30, 0.3) 0px, transparent 50%);
            filter: blur(100px);
            animation: meshPulse 25s ease-in-out infinite alternate;
        }

        @keyframes meshPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.15) rotate(2deg); }
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            gap: 50px;
        }

        /* Top Header */
        .header {
            text-align: center;
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #greeting {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        #clock {
            font-size: 96px;
            font-weight: 200;
            letter-spacing: -4px;
            line-height: 1;
            margin-bottom: 5px;
            color: var(--text-main);
            text-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        #date {
            font-size: 16px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        /* Search Section */
        .search-container {
            width: min(680px, 95vw);
            position: relative;
            z-index: 10;
            animation: fadeIn 1s ease 0.2s both;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .search-bar-wrap {
            position: relative;
            background: rgba(20, 35, 35, 0.95);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            padding: 4px;
        }

        .search-bar-wrap:focus-within {
            transform: scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 0 0 5px var(--accent-glow), 0 20px 50px rgba(0,0,0,0.4);
            background: #122222;
        }

        #search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 20px 16px 60px;
            font-size: 18px;
            color: var(--text-main);
            width: 100%;
        }

        #search-input::placeholder { color: var(--text-dim); opacity: 0.6; }

        .search-icon-btn {
            position: absolute;
            left: 20px;
            color: var(--text-dim);
            transition: color 0.3s;
        }

        .search-bar-wrap:focus-within .search-icon-btn { color: var(--accent); }

        .search-engine-hint {
            padding-right: 25px;
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0.5;
        }

        /* Bookmarks Grid */
        .bookmarks-section {
            width: min(900px, 95vw);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: "";
            width: 40px;
            height: 1px;
            background: var(--glass-border);
        }

        .bookmarks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 110px));
            gap: 20px;
            justify-content: center;
        }

        /* Bookmark card */
        .bm-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 15px 10px;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background: transparent;
            border: 1px solid transparent;
            position: relative;
            cursor: pointer;
        }

        .bm-item:hover {
            background: var(--glass-bg);
            border-color: var(--glass-border);
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* Hover action buttons on bookmark card */
        .bm-hover-actions {
            position: absolute;
            top: 6px;
            right: 6px;
            display: flex;
            gap: 3px;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 2;
        }

        .bm-item:hover .bm-hover-actions {
            opacity: 1;
        }

        .bm-action-btn {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: none;
            background: rgba(10, 30, 30, 0.85);
            color: var(--text-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            padding: 0;
        }

        .bm-action-btn:hover {
            background: rgba(0, 200, 180, 0.2);
            color: var(--accent);
        }

        .bm-action-btn.danger:hover {
            background: rgba(200, 60, 60, 0.2);
            color: #c86060;
        }

        .bm-icon-wrap {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s;
        }

        .bm-item:hover .bm-icon-wrap {
            border-color: var(--accent);
            background: rgba(0, 200, 180, 0.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .bm-icon-wrap img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .bm-letter {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
        }

        .bm-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.3s;
        }

        .bm-item:hover .bm-title {
            color: var(--text-main);
        }

        /* Add bookmark button */
        .bm-add-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 15px 10px;
            border-radius: 20px;
            border: 1px dashed rgba(255,255,255,0.1);
            background: transparent;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            color: var(--text-dim);
        }

        .bm-add-btn:hover {
            background: var(--glass-bg);
            border-color: var(--accent);
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            color: var(--accent);
        }

        .bm-add-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            border: 1px dashed rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .bm-add-btn:hover .bm-add-icon {
            border-color: var(--accent);
            background: rgba(0, 200, 180, 0.05);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .bm-add-label {
            font-size: 11px;
            font-weight: 600;
            text-align: center;
        }

        /* ── Modal overlay ── */
        .nt-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .nt-modal-overlay.visible {
            display: flex;
        }

        .nt-modal {
            background: #0f2222;
            border: 1px solid #2e4a4c;
            border-radius: 16px;
            padding: 24px;
            width: 360px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.92) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .nt-modal h3 {
            font-size: 15px;
            font-weight: 700;
            color: #e0f4f4;
            margin: 0;
        }

        .nt-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .nt-field label {
            font-size: 11px;
            color: #4a8080;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nt-field-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .nt-field input {
            flex: 1;
            background: #1a3838;
            border: 1px solid #2e4a4c;
            border-radius: 8px;
            color: #c8e8e5;
            font-size: 13px;
            padding: 9px 12px;
            outline: none;
            transition: border-color 0.15s;
        }

        .nt-field input:focus {
            border-color: var(--accent);
        }

        .nt-fetch-btn {
            background: rgba(0, 200, 180, 0.1);
            border: 1px solid #2e6a65;
            border-radius: 8px;
            color: var(--accent);
            font-size: 11px;
            font-weight: 600;
            padding: 9px 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }

        .nt-fetch-btn:hover {
            background: rgba(0, 200, 180, 0.2);
        }

        .nt-fetch-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .nt-modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .nt-btn {
            background: rgba(0, 200, 180, 0.1);
            border: 1px solid #2e6a65;
            border-radius: 8px;
            color: var(--accent);
            font-size: 13px;
            font-weight: 600;
            padding: 9px 20px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .nt-btn:hover {
            background: rgba(0, 200, 180, 0.22);
        }

        .nt-btn.cancel {
            background: transparent;
            border-color: #2e4a4c;
            color: #4a8080;
        }

        .nt-btn.cancel:hover {
            background: #1a3838;
            color: #c8e8e5;
        }

        /* Weather Mock */
        .weather-widget {
            position: fixed;
            top: 30px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--glass-bg);
            padding: 8px 18px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            font-size: 13px;
            font-weight: 600;
            animation: fadeIn 1.5s ease;
        }

        .weather-icon { color: var(--accent); }

        /* Footer Quote */
        .quote-container {
            position: fixed;
            bottom: 40px;
            text-align: center;
            max-width: 500px;
            opacity: 0.5;
            transition: opacity 0.5s;
        }

        .quote-container:hover { opacity: 1; }

        #quote-text {
            font-size: 13px;
            line-height: 1.6;
            font-style: italic;
            margin-bottom: 6px;
        }

        #quote-author {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* Omnibox */
        #omnibox-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: rgba(15, 30, 30, 0.98);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.5);
            z-index: 1000;
            overflow: hidden;
            padding: 8px 0;
            backdrop-filter: blur(20px);
            animation: omniIn 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes omniIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #omnibox-dropdown.visible { display: block; }

        .omni-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .omni-row:hover, .omni-row.active {
            background: rgba(0, 200, 180, 0.1);
        }

        .omni-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .omni-icon img {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .omni-text {
            display: flex;
            flex-direction: column;
            min-width: 0;
            flex: 1;
        }

        .omni-title {
            font-size: 14px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .omni-sub {
            font-size: 11px;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        /* System Stats Widget */
        .system-stats {
            position: fixed;
            bottom: 30px;
            right: 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--glass-bg);
            padding: 15px 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 160px;
            animation: fadeIn 1.5s ease;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            color: var(--text-dim);
        }

        .stat-val { color: var(--accent); }

        .stat-bar-bg {
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* Search Switcher */
        .engine-switcher {
            position: absolute;
            left: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            cursor: pointer;
            z-index: 11;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .engine-switcher:hover {
            background: rgba(255,255,255,0.05);
        }

        #search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 20px 16px 56px;
            font-size: 18px;
            color: var(--text-main);
            width: 100%;
        }

        .engine-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            background: #0f2222;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .engine-dropdown.visible { display: flex; }

        .engine-opt {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .engine-opt:hover {
            background: rgba(0, 200, 180, 0.1);
            color: var(--accent);
        }

        .engine-opt.active {
            color: var(--accent);
            background: rgba(0, 200, 180, 0.05);
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>

    <div class="weather-widget">
        <svg class="weather-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.58 5.42l1.42-1.42"/></svg>
        <span>24°C Sunny</span>
    </div>

    <div class="header">
        <div id="greeting">GOOD DAY</div>
        <div id="clock">00:00</div>
        <div id="date">MONDAY, MAY 13</div>
    </div>

    <div class="search-container">
        <div class="search-bar-wrap">
            <div class="engine-switcher" id="engine-switcher" title="Switch Search Engine">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <div class="engine-dropdown" id="engine-dropdown">
                    <div class="engine-opt" data-engine="google">Google</div>
                    <div class="engine-opt" data-engine="duckduckgo">DuckDuckGo</div>
                    <div class="engine-opt" data-engine="bing">Bing</div>
                    <div class="engine-opt" data-engine="brave">Brave</div>
                </div>
            </div>
            <input id="search-input" type="text" placeholder="Explore the universe with Vortex..." autofocus spellcheck="false" autocomplete="off" />
            <div id="omnibox-dropdown"></div>
            <div class="search-engine-hint" id="engine-hint">GOOGLE</div>
        </div>
    </div>

    <div class="bookmarks-section">
        <div class="section-header">
            <div class="section-title">Your Space</div>
        </div>
        <div id="bookmarks-grid" class="bookmarks-grid">
            <!-- Dynamic bookmarks loaded here -->
        </div>
    </div>

    <div class="system-stats">
        <div class="stat-item">
            <div class="stat-label"><span>CPU Usage</span><span class="stat-val" id="cpu-val">0%</span></div>
            <div class="stat-bar-bg"><div class="stat-bar-fill" id="cpu-bar" style="width: 0%"></div></div>
        </div>
        <div class="stat-item">
            <div class="stat-label"><span>RAM Usage</span><span class="stat-val" id="ram-val">0%</span></div>
            <div class="stat-bar-bg"><div class="stat-bar-fill" id="ram-bar" style="width: 0%"></div></div>
        </div>
    </div>

    <!-- Add / Edit Bookmark Modal -->
    <div id="bm-modal" class="nt-modal-overlay">
        <div class="nt-modal">
            <h3 id="bm-modal-title">Add Bookmark</h3>
            <div class="nt-field">
                <label>URL</label>
                <div class="nt-field-row">
                    <input id="bm-url-input" type="text" placeholder="https://example.com" spellcheck="false" />
                    <button class="nt-fetch-btn" id="bm-fetch-btn" title="Auto-fetch title">Fetch Title</button>
                </div>
            </div>
            <div class="nt-field">
                <label>Title</label>
                <input id="bm-title-input" type="text" placeholder="Site name" spellcheck="false" />
            </div>
            <div class="nt-modal-actions">
                <button class="nt-btn cancel" id="bm-modal-cancel">Cancel</button>
                <button class="nt-btn" id="bm-modal-save">Save</button>
            </div>
        </div>
    </div>

    <div class="quote-container">
        <p id="quote-text">"The best way to predict the future is to invent it."</p>
        <p id="quote-author">— Alan Kay</p>
    </div>

    <script>
        // ── vortexAPI bridge (newtab runs as webview with preload) ──────────────
        const vortex = window.vortexAPI || {
            send:   (c, d) => console.warn('[newtab] vortexAPI not available, send:', c),
            invoke: (c, ...a) => Promise.resolve(null),
            on:     (c, cb) => {}
        };

        // ── Clock & Greeting ────────────────────────────────────────────────────
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            let greet = "GOOD DAY";
            if (hours < 12) greet = "GOOD MORNING";
            else if (hours < 18) greet = "GOOD AFTERNOON";
            else greet = "GOOD EVENING";
            document.getElementById('greeting').textContent = greet;
            const h = String(hours).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options).toUpperCase();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ── Search ──────────────────────────────────────────────────────────────
        const searchInput    = document.getElementById('search-input');
        const dropdown       = document.getElementById('omnibox-dropdown');
        const engineSwitcher = document.getElementById('engine-switcher');
        const engineDropdown = document.getElementById('engine-dropdown');
        const engineHint     = document.getElementById('engine-hint');
        
        let _currentEngine = 'google';

        // Toggle engine dropdown
        engineSwitcher.addEventListener('click', (e) => {
            e.stopPropagation();
            engineDropdown.classList.toggle('visible');
        });

        document.addEventListener('click', () => engineDropdown.classList.remove('visible'));

        // Handle engine selection
        engineDropdown.querySelectorAll('.engine-opt').forEach(opt => {
            opt.addEventListener('click', () => {
                _currentEngine = opt.dataset.engine;
                engineHint.textContent = _currentEngine.toUpperCase();
                engineDropdown.querySelectorAll('.engine-opt').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                engineDropdown.classList.remove('visible');
                
                // Save preference
                vortex.invoke('storage:read', 'settings').then(s => {
                    if (s) { s.engine = _currentEngine; vortex.invoke('storage:write', 'settings', s); }
                });
            });
        });

        // Initialize engine from settings
        vortex.invoke('storage:read', 'settings').then(s => {
            if (s && s.engine) {
                _currentEngine = s.engine;
                engineHint.textContent = _currentEngine.toUpperCase();
                const opt = engineDropdown.querySelector(`[data-engine="${_currentEngine}"]`);
                if (opt) opt.classList.add('active');
            }
        });

        searchInput.addEventListener('keydown', (e) => {
            const handled = Omnibox.onKey(e);
            if (e.key === 'Enter' && searchInput.value.trim() && !handled) {
                const val = searchInput.value.trim();
                let url = val;

                // Simple URL detection
                const isUrl = /^https?:\/\//i.test(val) || (val.includes('.') && !val.includes(' '));
                
                if (isUrl) {
                    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
                } else {
                    const bases = {
                        google: 'https://www.google.com/search?q=',
                        duckduckgo: 'https://duckduckgo.com/?q=',
                        bing: 'https://www.bing.com/search?q=',
                        brave: 'https://search.brave.com/search?q='
                    };
                    url = (bases[_currentEngine] || bases.google) + encodeURIComponent(val);
                }
                
                vortex.send('newtab:openUrl', url);
            }
        });

        searchInput.addEventListener('input', (e) => Omnibox.onInput(e.target.value));
        searchInput.addEventListener('blur', () => setTimeout(() => dropdown.classList.remove('visible'), 200));
        searchInput.addEventListener('focus', () => { if (searchInput.value.trim()) Omnibox.onInput(searchInput.value); });

        // ── Weather Logic ───────────────────────────────────────────────────────
        async function updateWeather() {
            const el = document.querySelector('.weather-widget span');
            try {
                // Use wttr.in with JSON format for easy parsing
                const res = await fetch('https://wttr.in?format=j1');
                const data = await res.json();
                const cur = data.current_condition[0];
                const temp = cur.temp_C;
                const desc = cur.weatherDesc[0].value;
                el.textContent = `${temp}°C ${desc}`;
            } catch {
                el.textContent = "Weather unavailable";
            }
        }
        updateWeather();
        setInterval(updateWeather, 600000); // Every 10 mins

        // ── System Stats Logic ──────────────────────────────────────────────────
        async function updateStats() {
            try {
                const stats = await vortex.invoke('app:getSystemStats');
                if (!stats) return;

                document.getElementById('cpu-val').textContent = `${stats.cpu}%`;
                document.getElementById('cpu-bar').style.width = `${stats.cpu}%`;
                
                document.getElementById('ram-val').textContent = `${stats.ram}%`;
                document.getElementById('ram-bar').style.width = `${stats.ram}%`;

                // Color warning
                const cpuBar = document.getElementById('cpu-bar');
                const ramBar = document.getElementById('ram-bar');
                cpuBar.style.background = stats.cpu > 80 ? '#ff4d4d' : 'var(--accent)';
                ramBar.style.background = stats.ram > 85 ? '#ff4d4d' : 'var(--accent)';
            } catch {}
        }
        updateStats();
        setInterval(updateStats, 2000);

        // ── Omnibox Logic ───────────────────────────────────────────────────────
        const Omnibox = (() => {
            let _debounce = null;
            let _items = [];
            let _activeIdx = -1;
            let _originalValue = '';

            async function _fetchSuggest(query) {
                try {
                    const url = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(query)}`;
                    const res = await fetch(url);
                    const json = await res.json();
                    return (json[1] || []).slice(0, 5).map(s => ({ label: s, value: s, type: 'suggest' }));
                } catch { return []; }
            }

            async function _matchLocal(query) {
                const q = query.toLowerCase();
                const results = [];
                
                // Bookmarks
                const bms = (await vortex.invoke('storage:read', 'bookmarks')) || [];
                bms.forEach(bm => {
                    if ((bm.title && bm.title.toLowerCase().includes(q)) || (bm.url && bm.url.toLowerCase().includes(q))) {
                        results.push({ label: bm.title || bm.url, value: bm.url, sub: bm.url, type: 'bookmark' });
                    }
                });

                // History
                const history = (await vortex.invoke('storage:read', 'tab_history')) || [];
                history.forEach(item => {
                    if ((item.title && item.title.toLowerCase().includes(q)) || (item.url && item.url.toLowerCase().includes(q))) {
                        if (!results.find(r => r.value === item.url)) {
                            results.push({ label: item.title || item.url, value: item.url, sub: item.url, type: 'history' });
                        }
                    }
                });

                return results.slice(0, 4);
            }

            function _render(items) {
                _items = items;
                _activeIdx = -1;
                dropdown.innerHTML = '';
                if (items.length === 0) { dropdown.classList.remove('visible'); return; }

                items.forEach((item, idx) => {
                    const row = document.createElement('div');
                    row.className = 'omni-row';
                    
                    const icon = document.createElement('div');
                    icon.className = 'omni-icon';
                    if (item.type === 'bookmark') icon.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>';
                    else if (item.type === 'history') icon.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
                    else icon.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>';

                    const text = document.createElement('div');
                    text.className = 'omni-text';
                    const title = document.createElement('div');
                    title.className = 'omni-title';
                    title.textContent = item.label;
                    text.appendChild(title);

                    if (item.sub) {
                        const sub = document.createElement('div');
                        sub.className = 'omni-sub';
                        sub.textContent = item.sub;
                        text.appendChild(sub);
                    }

                    row.appendChild(icon);
                    row.appendChild(text);
                    row.addEventListener('mousedown', (e) => { e.preventDefault(); _select(idx); });
                    row.addEventListener('mouseover', () => _highlight(idx));
                    dropdown.appendChild(row);
                });
                dropdown.classList.add('visible');
            }

            function _highlight(idx) {
                const rows = dropdown.querySelectorAll('.omni-row');
                rows.forEach((r, i) => r.classList.toggle('active', i === idx));
                _activeIdx = idx;
            }

            function _select(idx) {
                const item = _items[idx];
                if (!item) return;
                searchInput.value = item.value;
                dropdown.classList.remove('visible');
                
                let url = item.value;
                if (item.type === 'suggest') {
                    const bases = {
                        google: 'https://www.google.com/search?q=',
                        duckduckgo: 'https://duckduckgo.com/?q=',
                        bing: 'https://www.bing.com/search?q=',
                        brave: 'https://search.brave.com/search?q='
                    };
                    url = (bases[_currentEngine] || bases.google) + encodeURIComponent(url);
                } else if (!/^https?:\/\//i.test(url)) {
                    url = 'https://' + url;
                }
                vortex.send('newtab:openUrl', url);
            }

            return {
                onInput: async (val) => {
                    const q = val.trim();
                    if (!q) { dropdown.classList.remove('visible'); return; }
                    _originalValue = val;
                    
                    const local = await _matchLocal(q);
                    _render(local);

                    clearTimeout(_debounce);
                    _debounce = setTimeout(async () => {
                        const suggest = await _fetchSuggest(q);
                        const freshLocal = await _matchLocal(q);
                        _render([...freshLocal, ...suggest]);
                    }, 250);
                },
                onKey: (e) => {
                    if (!dropdown.classList.contains('visible')) return false;
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        const next = (_activeIdx + 1) % _items.length;
                        _highlight(next);
                        searchInput.value = _items[next].value;
                        return true;
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        const next = (_activeIdx - 1 + _items.length) % _items.length;
                        if (_activeIdx === 0) {
                            _activeIdx = -1;
                            _highlight(-1);
                            searchInput.value = _originalValue;
                        } else {
                            _highlight(next);
                            searchInput.value = _items[next].value;
                        }
                        return true;
                    } else if (e.key === 'Enter' && _activeIdx >= 0) {
                        e.preventDefault();
                        _select(_activeIdx);
                        return true;
                    } else if (e.key === 'Escape') {
                        dropdown.classList.remove('visible');
                        return true;
                    }
                    return false;
                }
            };
        })();

        // ── Bookmark state ──────────────────────────────────────────────────────
        let _bookmarks = [];

        function _favicon(url) {
            try { return `https://www.google.com/s2/favicons?sz=128&domain=${new URL(url).hostname}`; }
            catch { return null; }
        }

        function _initial(title, url) {
            if (title) return title[0].toUpperCase();
            try { return new URL(url).hostname[0].toUpperCase(); } catch { return 'B'; }
        }

        // ── Render grid ─────────────────────────────────────────────────────────
        function renderBookmarks() {
            const grid = document.getElementById('bookmarks-grid');
            grid.innerHTML = '';

            _bookmarks.slice(0, 12).forEach(bm => {
                const item = document.createElement('div');
                item.className = 'bm-item';
                item.dataset.id  = bm.id;
                item.dataset.url = bm.url;

                const fav = _favicon(bm.url);
                const imgEl  = fav ? `<img src="${fav}" width="32" height="32" style="object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3))" onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />` : '';
                const letEl  = `<div class="bm-letter" style="${fav ? 'display:none' : ''}">${_initial(bm.title, bm.url)}</div>`;

                item.innerHTML = `
                    <div class="bm-hover-actions">
                        <button class="bm-action-btn" data-action="edit" title="Edit">
                            <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button class="bm-action-btn danger" data-action="remove" title="Remove">
                            <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                        </button>
                    </div>
                    <div class="bm-icon-wrap">${imgEl}${letEl}</div>
                    <span class="bm-title">${bm.title || bm.url}</span>
                `;

                // Click on card → open URL (not on action buttons)
                item.addEventListener('click', (e) => {
                    if (e.target.closest('[data-action]')) return;
                    vortex.send('newtab:openUrl', bm.url);
                });

                // Edit button
                item.querySelector('[data-action="edit"]').addEventListener('click', (e) => {
                    e.stopPropagation();
                    openModal('edit', bm);
                });

                // Remove button
                item.querySelector('[data-action="remove"]').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    _bookmarks = _bookmarks.filter(b => b.id !== bm.id);
                    await vortex.invoke('storage:write', 'bookmarks', _bookmarks);
                    renderBookmarks();
                });

                grid.appendChild(item);
            });

            // Add bookmark "+" button (only if < 12 bookmarks)
            if (_bookmarks.length < 12) {
                const addBtn = document.createElement('div');
                addBtn.className = 'bm-add-btn';
                addBtn.innerHTML = `
                    <div class="bm-add-icon">
                        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </div>
                    <span class="bm-add-label">Add</span>
                `;
                addBtn.addEventListener('click', () => openModal('add', null));
                grid.appendChild(addBtn);
            }
        }

        // ── Load bookmarks from storage ─────────────────────────────────────────
        async function loadBookmarks() {
            try {
                _bookmarks = (await vortex.invoke('storage:read', 'bookmarks')) || [];
            } catch {
                _bookmarks = [];
            }
            renderBookmarks();
        }

        // ── Live updates via IPC (storage:updated) ──────────────────────────────
        vortex.on('storage:updated', (name) => {
            if (name === 'bookmarks') loadBookmarks();
        });

        loadBookmarks();

        // ── Modal logic ─────────────────────────────────────────────────────────
        let _modalMode = 'add';   // 'add' | 'edit'
        let _editBm    = null;

        const modal       = document.getElementById('bm-modal');
        const modalTitle  = document.getElementById('bm-modal-title');
        const urlInput    = document.getElementById('bm-url-input');
        const titleInput  = document.getElementById('bm-title-input');
        const fetchBtn    = document.getElementById('bm-fetch-btn');
        const saveBtn     = document.getElementById('bm-modal-save');
        const cancelBtn   = document.getElementById('bm-modal-cancel');

        function openModal(mode, bm) {
            _modalMode = mode;
            _editBm    = bm || null;
            modalTitle.textContent = mode === 'edit' ? 'Edit Bookmark' : 'Add Bookmark';
            urlInput.value   = bm ? bm.url   : '';
            titleInput.value = bm ? bm.title : '';
            modal.classList.add('visible');
            urlInput.focus();
        }

        function closeModal() {
            modal.classList.remove('visible');
            urlInput.value   = '';
            titleInput.value = '';
            _editBm = null;
        }

        cancelBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

        // Keyboard: Esc closes, Enter saves
        modal.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
            if (e.key === 'Enter' && !e.shiftKey) saveBtn.click();
        });

        // Auto-fetch title when URL loses focus
        urlInput.addEventListener('blur', () => {
            if (urlInput.value.trim() && !titleInput.value.trim()) autoFetchTitle();
        });

        // Fetch Title button
        fetchBtn.addEventListener('click', autoFetchTitle);

        async function autoFetchTitle() {
            let url = urlInput.value.trim();
            if (!url) return;
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
            urlInput.value = url;

            fetchBtn.disabled = true;
            fetchBtn.textContent = '…';
            try {
                // Use Google's page title via a simple fetch (works for most public pages)
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, { signal: AbortSignal.timeout(5000) });
                const json = await res.json();
                const match = json.contents?.match(/<title[^>]*>([^<]+)<\/title>/i);
                if (match && match[1]) {
                    titleInput.value = match[1].trim().slice(0, 80);
                } else {
                    // Fallback: use hostname
                    titleInput.value = new URL(url).hostname.replace(/^www\./, '');
                }
            } catch {
                try { titleInput.value = new URL(url).hostname.replace(/^www\./, ''); } catch {}
            }
            fetchBtn.disabled = false;
            fetchBtn.textContent = 'Fetch Title';
            titleInput.focus();
        }

        saveBtn.addEventListener('click', async () => {
            let url   = urlInput.value.trim();
            let title = titleInput.value.trim();
            if (!url) return;
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
            if (!title) {
                try { title = new URL(url).hostname.replace(/^www\./, ''); } catch { title = url; }
            }

            if (_modalMode === 'add') {
                // Avoid duplicates
                if (_bookmarks.find(b => b.url === url)) { closeModal(); return; }
                const entry = { id: 'bm_' + Date.now() + '_' + Math.random().toString(36).slice(2), url, title, addedAt: Date.now() };
                _bookmarks.unshift(entry);
            } else if (_modalMode === 'edit' && _editBm) {
                const bm = _bookmarks.find(b => b.id === _editBm.id);
                if (bm) { bm.url = url; bm.title = title; }
            }

            await vortex.invoke('storage:write', 'bookmarks', _bookmarks);
            closeModal();
            renderBookmarks();
        });

        // ── Dynamic Quotes ──────────────────────────────────────────────────────
        const QUOTES = [
            { t: "The best way to predict the future is to invent it.", a: "Alan Kay" },
            { t: "Stay hungry, stay foolish.", a: "Steve Jobs" },
            { t: "Success is not final, failure is not fatal.", a: "Winston Churchill" },
            { t: "It always seems impossible until it's done.", a: "Nelson Mandela" },
            { t: "Code is where the magic happens.", a: "Vortex" },
            { t: "Simplicity is the ultimate sophistication.", a: "Leonardo da Vinci" }
        ];
        const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
        document.getElementById('quote-text').textContent = `"${q.t}"`;
        document.getElementById('quote-author').textContent = `— ${q.a}`;
    </script>
</body>
</html>
