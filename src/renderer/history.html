<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="color-scheme" content="dark" />
  <title>History — Vortex</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #0d1f1f;
      color: #c8e8e5
    }

    body {
      display: flex;
      flex-direction: column;
      position: fixed;
      inset: 0
    }

    /* ── Header ── */
    .h-header {
      padding: 20px 24px 0;
      flex-shrink: 0
    }

    .h-title {
      font-size: 18px;
      font-weight: 700;
      color: #e0f4f4;
      margin-bottom: 16px
    }

    .h-tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid #1e3838;
      padding-bottom: 0
    }

    .h-tab {
      padding: 8px 18px;
      font-size: 13px;
      color: #4a8080;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      user-select: none
    }

    .h-tab:hover {
      color: #c8e8e5
    }

    .h-tab.active {
      color: #00c8b4;
      border-bottom-color: #00c8b4
    }

    /* ── Scroll area ── */
    .h-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px 24px;
      min-height: 0
    }

    .h-body::-webkit-scrollbar {
      width: 5px
    }

    .h-body::-webkit-scrollbar-thumb {
      background: #1a4a4a;
      border-radius: 3px
    }

    /* ── Section label ── */
    .h-section-label {
      font-size: 11px;
      font-weight: 600;
      color: #2e6060;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin: 16px 0 8px
    }

    /* ── Tab card ── */
    .tab-card {
      background: #122222;
      border: 1px solid #1e3838;
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.15s
    }

    .tab-card:hover {
      border-color: #2e5050
    }

    .tab-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none
    }

    .tab-card-header:hover {
      background: #162e2e
    }

    .tc-favicon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: rgba(0, 200, 180, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden
    }

    .tc-favicon img {
      width: 16px;
      height: 16px;
      border-radius: 2px
    }

    .tc-info {
      flex: 1;
      min-width: 0
    }

    .tc-title {
      font-size: 13px;
      color: #c8e8e5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .tc-meta {
      font-size: 11px;
      color: #2e6060;
      margin-top: 2px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap
    }

    .tc-meta span {
      display: flex;
      align-items: center;
      gap: 4px
    }

    .tc-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
      flex-shrink: 0
    }

    .tc-badge.active-badge {
      background: rgba(0, 200, 180, 0.15);
      color: #00c8b4;
      border: 1px solid rgba(0, 200, 180, 0.3)
    }

    .tc-badge.closed-badge {
      background: rgba(100, 100, 100, 0.15);
      color: #4a8080;
      border: 1px solid #2e4a4c
    }

    .tc-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0
    }

    .tc-btn {
      background: transparent;
      border: 1px solid #2e4a4c;
      border-radius: 6px;
      color: #4a8080;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px
    }

    .tc-btn:hover {
      background: #1e3838;
      color: #00c8b4;
      border-color: #00c8b4
    }

    .tc-btn.restore-btn {
      border-color: #2e6a65;
      color: #00c8b4
    }

    .tc-btn.restore-btn:hover {
      background: rgba(0, 200, 180, 0.1)
    }

    .tc-chevron {
      color: #2e6060;
      transition: transform 0.2s;
      flex-shrink: 0
    }

    .tab-card.expanded .tc-chevron {
      transform: rotate(90deg)
    }

    /* ── Nav log ── */
    .nav-log {
      display: none;
      border-top: 1px solid #1a3030
    }

    .tab-card.expanded .nav-log {
      display: block
    }

    .nav-entry {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid #0f2020;
      position: relative;
      cursor: pointer;
      transition: background 0.1s
    }

    .nav-entry:last-child {
      border-bottom: none
    }

    .nav-entry:hover {
      background: #0f2222
    }

    .nav-timeline {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      padding-top: 3px
    }

    .nav-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #1e4a4a;
      border: 2px solid #2e6060;
      flex-shrink: 0
    }

    .nav-dot.current {
      background: #00c8b4;
      border-color: #00c8b4;
      box-shadow: 0 0 6px rgba(0, 200, 180, 0.4)
    }

    .nav-line {
      width: 2px;
      flex: 1;
      background: #1a3838;
      min-height: 16px;
      margin-top: 3px
    }

    .nav-entry:last-child .nav-line {
      display: none
    }

    .nav-content {
      flex: 1;
      min-width: 0
    }

    .nav-url {
      font-size: 12px;
      color: #7aadad;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .nav-url-title {
      font-size: 12px;
      color: #c8e8e5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px
    }

    .nav-times {
      display: flex;
      gap: 12px;
      margin-top: 3px;
      flex-wrap: wrap
    }

    .nav-time-item {
      font-size: 10px;
      color: #2e6060;
      display: flex;
      align-items: center;
      gap: 4px
    }

    .nav-time-item svg {
      flex-shrink: 0
    }

    .nav-duration {
      font-size: 10px;
      color: #1e5050;
      background: #0f2222;
      border: 1px solid #1a3838;
      border-radius: 4px;
      padding: 1px 6px;
      margin-left: 4px
    }

    .nav-open-btn {
      background: transparent;
      border: none;
      color: #2e6060;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: all 0.12s;
      flex-shrink: 0;
      margin-top: 1px
    }

    .nav-open-btn:hover {
      color: #00c8b4;
      background: rgba(0, 200, 180, 0.08)
    }

    /* ── Empty state ── */
    .h-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      gap: 12px;
      color: #2e6060;
      text-align: center
    }

    .h-empty svg {
      opacity: 0.3
    }

    .h-empty p {
      font-size: 13px
    }

    /* ── Favicon fallback SVG ── */
    .fav-svg {
      color: #2e6060
    }
  </style>
</head>

<body>

  <div class="h-header">
    <div class="h-title">History</div>
    <div class="h-tabs">
      <div class="h-tab active" data-tab="active">Active Tabs</div>
      <div class="h-tab" data-tab="closed">Closed Tabs</div>
    </div>
  </div>

  <div class="h-body" id="h-body"></div>

  <script>
    const SKIP_URLS = new Set(['https://www.google.com', 'https://www.google.com/', 'about:blank', '']);
    function isSkip(url) { return !url || url.startsWith('vortex://') || SKIP_URLS.has(url); }

    function _ts(ms) { if (!ms) return '—'; const d = new Date(ms); return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' ' + d.toLocaleDateString([], { month: 'short', day: 'numeric' }); }
    function _dur(a, b) { if (!a || !b) return null; const s = Math.round((b - a) / 1000); if (s < 60) return s + 's'; if (s < 3600) return Math.floor(s / 60) + 'm ' + (s % 60) + 's'; return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm'; }
    function _ago(ms) { if (!ms) return ''; const s = Math.round((Date.now() - ms) / 1000); if (s < 60) return s + 's ago'; if (s < 3600) return Math.floor(s / 60) + 'm ago'; if (s < 86400) return Math.floor(s / 3600) + 'h ago'; return Math.floor(s / 86400) + 'd ago'; }

    const GLOBE_SVG = `<svg class="fav-svg" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;
    const CLOCK_SVG = `<svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
    const EXIT_SVG = `<svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`;
    const OPEN_SVG = `<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;
    const RESTORE_SVG = `<svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>`;
    const SWITCH_SVG = `<svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>`;

    let _data = { activeTabs: [], closedTabs: [] };
    let _currentTab = 'active';

    function _faviconEl(favicon, title) {
      const wrap = document.createElement('div');
      wrap.className = 'tc-favicon';
      if (favicon) {
        const img = document.createElement('img');
        img.src = favicon;
        img.onerror = () => { wrap.innerHTML = GLOBE_SVG; };
        wrap.appendChild(img);
      } else {
        wrap.innerHTML = GLOBE_SVG;
      }
      return wrap;
    }

    function _buildNavLog(navLog, isActive) {
      const container = document.createElement('div');
      container.className = 'nav-log';
      if (!navLog || navLog.length === 0) {
        container.innerHTML = `<div style="padding:12px 14px;font-size:12px;color:#2e6060">No navigations recorded</div>`;
        return container;
      }
      // Show newest first
      const entries = [...navLog].reverse();
      entries.forEach((nav, i) => {
        if (isSkip(nav.url)) return;
        const entry = document.createElement('div');
        entry.className = 'nav-entry';

        const isCurrent = isActive && i === 0 && !nav.exitedAt;
        const dur = _dur(nav.enteredAt, nav.exitedAt || (isCurrent ? Date.now() : null));

        entry.innerHTML = `
        <div class="nav-timeline">
          <div class="nav-dot${isCurrent ? ' current' : ''}"></div>
          <div class="nav-line"></div>
        </div>
        <div class="nav-content">
          <div class="nav-url-title">${nav.title || nav.url}</div>
          <div class="nav-url">${nav.url}</div>
          <div class="nav-times">
            <span class="nav-time-item">${CLOCK_SVG} Entered: ${_ts(nav.enteredAt)}</span>
            ${nav.exitedAt ? `<span class="nav-time-item">${EXIT_SVG} Left: ${_ts(nav.exitedAt)}</span>` : `<span class="nav-time-item" style="color:#00c8b4">${CLOCK_SVG} Active now</span>`}
            ${dur ? `<span class="nav-duration">${dur}</span>` : ''}
          </div>
        </div>
        <button class="nav-open-btn" title="Open in new tab">${OPEN_SVG}</button>
      `;

        entry.querySelector('.nav-open-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          _send('history:openUrl', nav.url);
        });
        entry.addEventListener('click', () => _send('history:openUrl', nav.url));

        container.appendChild(entry);
      });
      return container;
    }

    function _buildTabCard(tab, type) {
      const card = document.createElement('div');
      card.className = 'tab-card';

      const realNavs = (tab.navLog || []).filter(n => !isSkip(n.url));
      const lastNav = realNavs[realNavs.length - 1];
      const lastUrl = lastNav ? lastNav.url : null;

      const header = document.createElement('div');
      header.className = 'tab-card-header';

      const faviconEl = _faviconEl(tab.favicon, tab.title);

      const info = document.createElement('div');
      info.className = 'tc-info';
      info.innerHTML = `
      <div class="tc-title">${tab.title || 'Untitled Tab'}</div>
      <div class="tc-meta">
        <span>${CLOCK_SVG} Created: ${_ago(tab.createdAt)}</span>
        ${lastNav ? `<span>${CLOCK_SVG} Last nav: ${_ago(lastNav.enteredAt)}</span>` : ''}
        ${type === 'closed' && tab.closedAt ? `<span>${EXIT_SVG} Closed: ${_ago(tab.closedAt)}</span>` : ''}
        <span style="color:#1e5050">${realNavs.length} page${realNavs.length !== 1 ? 's' : ''}</span>
      </div>
    `;

      const badge = document.createElement('span');
      badge.className = `tc-badge ${type === 'active' ? 'active-badge' : 'closed-badge'}`;
      badge.textContent = type === 'active' ? (tab.isActive ? 'Current' : 'Active') : 'Closed';

      const actions = document.createElement('div');
      actions.className = 'tc-actions';

      if (type === 'active') {
        const switchBtn = document.createElement('button');
        switchBtn.className = 'tc-btn';
        switchBtn.innerHTML = `${SWITCH_SVG} Switch`;
        switchBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          _send('history:switchTab', tab.id);
        });
        actions.appendChild(switchBtn);
      } else {
        const restoreBtn = document.createElement('button');
        restoreBtn.className = 'tc-btn restore-btn';
        restoreBtn.innerHTML = `${RESTORE_SVG} Restore`;
        restoreBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          _send('history:restore', tab.id);
          card.style.opacity = '0.4';
          card.style.pointerEvents = 'none';
          setTimeout(() => card.remove(), 400);
        });
        actions.appendChild(restoreBtn);
      }

      if (lastUrl) {
        const openBtn = document.createElement('button');
        openBtn.className = 'tc-btn';
        openBtn.innerHTML = `${OPEN_SVG} Open`;
        openBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          _send('history:openUrl', lastUrl);
        });
        actions.appendChild(openBtn);
      }

      const chevron = document.createElement('span');
      chevron.className = 'tc-chevron';
      chevron.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`;

      header.appendChild(faviconEl);
      header.appendChild(info);
      header.appendChild(badge);
      header.appendChild(actions);
      header.appendChild(chevron);

      const navLog = _buildNavLog(tab.navLog, type === 'active');

      header.addEventListener('click', () => {
        card.classList.toggle('expanded');
      });

      card.appendChild(header);
      card.appendChild(navLog);
      return card;
    }

    function _render() {
      const body = document.getElementById('h-body');
      body.innerHTML = '';

      if (_currentTab === 'active') {
        const tabs = _data.activeTabs || [];
        if (tabs.length === 0) {
          body.innerHTML = `<div class="h-empty">${GLOBE_SVG.replace('14', '40').replace('14', '40')}<p>No active tabs</p></div>`;
          return;
        }
        const label = document.createElement('div');
        label.className = 'h-section-label';
        label.textContent = `${tabs.length} Active Tab${tabs.length !== 1 ? 's' : ''}`;
        body.appendChild(label);
        tabs.forEach(tab => body.appendChild(_buildTabCard(tab, 'active')));
      } else {
        const tabs = _data.closedTabs || [];
        if (tabs.length === 0) {
          body.innerHTML = `<div class="h-empty">${GLOBE_SVG.replace('14', '40').replace('14', '40')}<p>No closed tabs yet</p></div>`;
          return;
        }
        const label = document.createElement('div');
        label.className = 'h-section-label';
        label.textContent = `${tabs.length} Closed Tab${tabs.length !== 1 ? 's' : ''}`;
        body.appendChild(label);
        tabs.forEach(tab => body.appendChild(_buildTabCard(tab, 'closed')));
      }
    }

    // Tab switcher
    document.querySelectorAll('.h-tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.h-tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        _currentTab = t.dataset.tab;
        _render();
      });
    });

    // IPC bridge
    function _send(channel, payload) {
      if (window.parent && window.parent.postMessage) {
        window.parent.postMessage({ __vortexAction: true, channel, payload }, '*');
      }
    }

    // Receive data from parent
    window.addEventListener('message', (e) => {
      if (!e.data || !e.data.__vortexIPC) return;
      if (e.data.channel === 'history:data') {
        _data = e.data.data || { activeTabs: [], closedTabs: [] };
        _render();
      }
    });

    // Signal ready to parent
    if (window.parent) {
      window.parent.postMessage({ __vortexAction: true, channel: 'history:ready', payload: null }, '*');
    }
  </script>
</body>

</html>
